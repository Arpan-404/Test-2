<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysioCare Tracker</title>
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @page { size: A4; margin: 10mm; }
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            .print-break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            .print-break-after-auto { page-break-after: auto; }
            thead.print-table-header { display: table-header-group; }
            table.main-print-table { page-break-inside: auto; width: 100%; }
            tr.main-print-row { page-break-inside: avoid; page-break-after: auto; }
            tr.main-print-row-allow-break { page-break-inside: auto; page-break-after: auto; }
            .editable-cell:empty:before { content: none !important; display: none !important; }
        }
        
        .editable-cell { min-width: 30px; max-width: 100%; outline: none; word-break: break-word; white-space: pre-wrap; transition: background-color 0.2s; }
        .editable-cell:empty:before { content: attr(data-placeholder); color: #cbd5e1; pointer-events: none; display: block; }
        .editable-cell:focus { background-color: rgba(239, 246, 255, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // --- FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithCustomToken, signOut, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const generateId = () => { return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15); };

        // --- FIREBASE CONFIGURATION ---
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
              apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
              authDomain: "patient-records-arpan.firebaseapp.com",
              projectId: "patient-records-arpan",
              storageBucket: "patient-records-arpan.firebasestorage.app",
              messagingSenderId: "599041105903",
              appId: "1:599041105903:web:7f0c1c10f38f12cc2ee01a"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'github-physio-app';

        // --- Custom Table Builder Component ---
        function CustomTableEditor({ table, updateTable, removeTable }) {
            const addRow = () => { updateTable({ ...table, rows: [...table.rows, Array(table.headers.length).fill('')] }); };
            const addCol = () => { updateTable({ ...table, headers: [...table.headers, 'New Col'], rows: table.rows.map(r => [...r, '']) }); };
            const removeRow = (idx) => { updateTable({ ...table, rows: table.rows.filter((_, i) => i !== idx) }); };
            const removeCol = (idx) => { updateTable({ ...table, headers: table.headers.filter((_, i) => i !== idx), rows: table.rows.map(r => r.filter((_, i) => i !== idx)) }); };
            const updateHeader = (idx, val) => { updateTable({ ...table, headers: table.headers.map((h, i) => i === idx ? val : h) }); };
            const updateCell = (rIdx, cIdx, val) => { updateTable({ ...table, rows: table.rows.map((row, i) => i === rIdx ? row.map((cell, j) => j === cIdx ? val : cell) : row) }); };
            const updateTitle = (val) => { updateTable({ ...table, title: val }); };

            return (
                <div className="w-fit max-w-full bg-white border border-slate-200 rounded-lg shadow-sm overflow-x-auto print:border-none print:shadow-none print-break-inside-avoid">
                    <div className={`bg-slate-100 px-3 py-2 flex items-center justify-between border-b border-slate-200 print:bg-transparent print:px-0 ${table.title ? 'print:border-b print:border-[#1e40af]' : 'print:border-none print:p-0'}`}>
                        <div contentEditable suppressContentEditableWarning onBlur={(e) => updateTitle(e.currentTarget.textContent)} className={`font-bold text-sm text-blue-800 outline-none editable-cell w-auto print:text-[#1e40af] print:text-[18px] ${!table.title ? 'print:hidden' : ''}`} data-placeholder="Table Title (Optional)">{table.title}</div>
                        <div className="flex gap-2 print:hidden ml-4">
                            <button onClick={addCol} className="text-[10px] bg-white border border-slate-300 text-slate-600 px-2 py-1 rounded hover:bg-slate-50 whitespace-nowrap">+ Col</button>
                            <button onClick={addRow} className="text-[10px] bg-white border border-slate-300 text-slate-600 px-2 py-1 rounded hover:bg-slate-50 whitespace-nowrap">+ Row</button>
                            <button onClick={removeTable} className="text-[10px] bg-red-50 border border-red-200 text-red-600 px-2 py-1 rounded hover:bg-red-100"><i className="ph-bold ph-trash"></i></button>
                        </div>
                    </div>
                    <div className="p-2 print:p-0 print:mt-2">
                        <table className="w-auto min-w-[200px] text-left border-collapse table-auto print:border print:border-[#1e40af]">
                            <thead>
                                <tr>
                                    {table.headers.map((h, i) => (
                                        <th key={i} className="relative group border border-slate-200 p-0 bg-slate-50 print:border print:border-[#1e40af] print:bg-blue-50/30 print-break-inside-avoid">
                                            <div contentEditable suppressContentEditableWarning onBlur={(e) => updateHeader(i, e.currentTarget.textContent)} className="editable-cell font-semibold text-slate-700 text-[12px] p-2 print:text-[#1e40af] print:font-bold print:text-[16px]" data-placeholder="Header">{h}</div>
                                            {table.headers.length > 1 && ( <button onClick={() => removeCol(i)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 rounded-full w-4 h-4 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity print:hidden text-[8px] border border-red-200 z-10"><i className="ph-bold ph-x"></i></button> )}
                                        </th>
                                    ))}
                                    <th className="w-8 border-none print:hidden"></th>
                                </tr>
                            </thead>
                            <tbody>
                                {table.rows.map((row, rIdx) => (
                                    <tr key={rIdx} className="group print-break-inside-avoid">
                                        {row.map((cell, cIdx) => (
                                            <td key={cIdx} className="border border-slate-200 p-0 align-top print:border print:border-[#1e40af]">
                                                <div contentEditable suppressContentEditableWarning onBlur={(e) => updateCell(rIdx, cIdx, e.currentTarget.textContent)} className="editable-cell text-slate-700 text-[12px] p-2 min-h-[32px] print:text-slate-900 print:min-h-0 print:py-1.5 print:px-2.5 print:text-[16px]">{cell}</div>
                                            </td>
                                        ))}
                                        <td className="w-8 text-center border-none p-0 align-middle print:hidden">
                                            {table.rows.length > 1 && ( <button onClick={() => removeRow(rIdx)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1"><i className="ph-bold ph-trash text-xs"></i></button> )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function App() {
          const [patients, setPatients] = useState([]);
          const [currentView, setCurrentView] = useState('home');
          const [activePatientId, setActivePatientId] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');
          const [isSaving, setIsSaving] = useState(false);
          const [user, setUser] = useState(null);
          const [isConnecting, setIsConnecting] = useState(true);

          useEffect(() => {
            const initAuth = async () => {
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  try { await signInWithCustomToken(auth, __initial_auth_token); } catch(e) { console.error(e); }
              } else {
                  try { await signInAnonymously(auth); } catch(e) {}
              }
            };
            initAuth();

            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              setIsConnecting(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const patientsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'patients');
            const unsubscribe = onSnapshot(patientsRef, (snapshot) => {
              const data = [];
              snapshot.forEach(doc => {
                  const p = doc.data();
                  if (p.customTables) {
                      p.customTables = p.customTables.map(t => {
                          let parsedRows = [['', '']];
                          try { parsedRows = typeof t.rows === 'string' ? JSON.parse(t.rows) : t.rows; } catch(e) {}
                          return { ...t, rows: parsedRows };
                      });
                  }
                  data.push(p);
              });
              setPatients(data);
            }, (error) => { console.error("Firestore error:", error); });
            return () => unsubscribe();
          }, [user]);

          const handleGoogleLogin = async () => { try { await signInWithPopup(auth, googleProvider); } catch (error) {} };
          const handleLogout = async () => { try { await signOut(auth); setPatients([]); } catch (error) {} };

          const handleCreatePatient = () => {
            let newIpId;
            do { newIpId = Math.floor(1000 + Math.random() * 9000).toString(); } while (patients.some(p => p.ipId === newIpId));

            const newPatient = {
              id: generateId(), ipId: newIpId, date: new Date().toISOString().split('T')[0],
              name: '', age: '', gender: '', contact: '', chiefComplaints: '', history: '', 
              assessmentNote: '', diagnosis: '', treatmentNote: '', customTables: [],
              isPublished: false // NEW PUBLISH STATE
            };
            setPatients([...patients, newPatient]); setActivePatientId(newPatient.id); setCurrentView('patient');
          };

          const handleSavePatient = async (updatedPatient) => {
            setIsSaving(true);
            setPatients(prev => {
                const exists = prev.find(p => p.id === updatedPatient.id);
                if (exists) return prev.map(p => p.id === updatedPatient.id ? updatedPatient : p);
                return [...prev, updatedPatient];
            });

            if (user && !user.isAnonymous) {
              try {
                const patientToSave = { ...updatedPatient };
                if (patientToSave.customTables) {
                    patientToSave.customTables = patientToSave.customTables.map(t => ({ ...t, rows: JSON.stringify(t.rows) }));
                }
                
                // 1. Save to Private Tracker Collection
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'patients', updatedPatient.id);
                await setDoc(docRef, patientToSave);

                // 2. Publish/Unpublish to Public Data (For Patient Login on Website)
                const publicDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'prescriptions', updatedPatient.ipId);
                if (updatedPatient.isPublished) {
                    await setDoc(publicDocRef, patientToSave);
                } else {
                    try { await deleteDoc(publicDocRef); } catch(e) {}
                }

              } catch(e) { console.error("Failed to save patient to cloud: ", e); }
            }
            setTimeout(() => setIsSaving(false), 500); 
          };

          const filteredPatients = patients.filter(p => p.ipId.toLowerCase().includes(searchQuery.toLowerCase()) || p.name.toLowerCase().includes(searchQuery.toLowerCase()));

          if (isConnecting) return (<div className="min-h-screen bg-slate-50 flex items-center justify-center">Loading...</div>);
          if (!user || user.isAnonymous) return (
              <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4">
                  <div className="bg-white p-8 rounded-2xl shadow-lg max-w-sm w-full text-center space-y-6">
                      <div className="mx-auto bg-blue-100 text-blue-600 w-16 h-16 rounded-full flex items-center justify-center mb-4"><i className="ph-fill ph-activity text-4xl"></i></div>
                      <div><h1 className="text-2xl font-bold">PhysioCare Tracker</h1><p className="text-sm text-slate-500 mt-1">Doctor Portal</p></div>
                      <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 font-medium py-3 px-4 rounded-xl hover:bg-slate-50"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" /> Sign in with Google</button>
                  </div>
              </div>
          )

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans print:bg-white print:m-0 print:p-0">
              <header className="bg-blue-600 text-white shadow-md sticky top-0 z-10 print:hidden">
                <div className="max-w-6xl mx-auto px-3 py-2.5 flex justify-between items-center">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('home')}><h1 className="text-lg font-bold">PhysioCare</h1></div>
                  <div className="flex items-center gap-3">
                      {isSaving && <span className="text-xs font-medium text-blue-200">Syncing...</span>}
                      {currentView === 'home' && <button onClick={handleCreatePatient} className="flex items-center gap-1.5 bg-blue-500 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-blue-400 border border-blue-400">+ Patient</button>}
                      <button onClick={handleLogout} className="flex items-center justify-center w-8 h-8 rounded-full bg-blue-700 hover:bg-blue-800"><i className="ph-bold ph-sign-out"></i></button>
                  </div>
                </div>
              </header>

              <main className="max-w-6xl mx-auto px-2 sm:px-4 py-4 print:p-0 print:m-0 print:max-w-none">
                {currentView === 'home' ? (
                  <HomeView patients={filteredPatients} searchQuery={searchQuery} setSearchQuery={setSearchQuery} onOpenPatient={(id) => {setActivePatientId(id); setCurrentView('patient');}} />
                ) : (
                  <PatientDetailView patient={patients.find(p => p.id === activePatientId)} onSave={handleSavePatient} onCancel={() => setCurrentView('home')} />
                )}
              </main>
            </div>
          );
        }

        // --- HOME VIEW ---
        function HomeView({ patients, searchQuery, setSearchQuery, onOpenPatient }) {
          return (
            <div className="space-y-4 print:hidden">
              <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex items-center gap-2"><i className="ph-bold ph-magnifying-glass text-slate-400"></i><input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search..." className="w-full outline-none text-sm" /></div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                  <table className="w-full border-collapse text-left">
                    <thead className="bg-slate-50 border-b border-slate-200 text-xs text-slate-600 uppercase"><tr><th className="py-3 px-4 w-16">UPID</th><th className="py-3 px-4">Patient</th><th className="py-3 px-4 w-24">Published</th></tr></thead>
                    <tbody>
                      {patients.length === 0 ? (<tr><td colSpan="3" className="py-8 text-center text-sm text-slate-400">No patients yet.</td></tr>) : (
                        patients.map(p => (
                          <tr key={p.id} className="border-b border-slate-100 hover:bg-blue-50/50 cursor-pointer" onClick={() => onOpenPatient(p.id)}>
                            <td className="py-3 px-4 text-sm font-semibold text-blue-600">{p.ipId}</td>
                            <td className="py-3 px-4"><div className="font-medium text-sm text-slate-800">{p.name || 'Unnamed'}</div><div className="text-xs text-slate-500">{p.contact}</div></td>
                            <td className="py-3 px-4">
                                {p.isPublished ? <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-xs font-bold">Yes</span> : <span className="bg-slate-100 text-slate-500 px-2 py-1 rounded text-xs">No</span>}
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
              </div>
            </div>
          );
        }

        // --- PATIENT DETAIL VIEW ---
        function PatientDetailView({ patient, onSave, onCancel }) {
          const [formData, setFormData] = useState(() => ({ ...patient, customTables: patient.customTables || [], isPublished: patient.isPublished || false }));

          const handleInputChange = (e) => { const { name, value } = e; setFormData(prev => ({ ...prev, [name]: value })); };
          
          const handleAddCustomTable = (section) => setFormData(prev => ({ ...prev, customTables: [...prev.customTables, { id: generateId(), section, title: '', headers: ['Col 1', 'Col 2'], rows: [['', ''], ['', '']] }] }));
          const handleUpdateCustomTable = (t) => setFormData(prev => ({ ...prev, customTables: prev.customTables.map(old => old.id === t.id ? t : old) }));
          const handleRemoveCustomTable = (id) => setFormData(prev => ({ ...prev, customTables: prev.customTables.filter(t => t.id !== id) }));

          return (
            <div>
              <div className="space-y-4 print:hidden">
                <div className="flex items-center justify-between px-1">
                  <button onClick={onCancel} className="flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800">← Back</button>
                  <div className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold text-xs">UPID: {formData.ipId}</div>
                </div>

                <section className="bg-white p-3 sm:p-4 rounded-xl shadow-sm border border-slate-200">
                  <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-3">
                    <input type="text" name="name" value={formData.name} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none" placeholder="Name" />
                    <input type="number" name="age" value={formData.age} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none" placeholder="Age" />
                    <select name="gender" value={formData.gender} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none"><option value="">Gender</option><option value="Male">Male</option><option value="Female">Female</option></select>
                    <input type="tel" name="contact" value={formData.contact} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none" placeholder="Contact" />
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <textarea name="chiefComplaints" value={formData.chiefComplaints} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none min-h-[60px]" placeholder="Chief Complaints"></textarea>
                    <textarea name="history" value={formData.history} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none min-h-[60px]" placeholder="History"></textarea>
                  </div>
                </section>

                <section className="bg-white p-3 sm:p-4 rounded-xl shadow-sm border border-slate-200 space-y-3">
                  <div className="flex items-center justify-between border-b border-slate-100 pb-2"><h2 className="font-semibold text-sm text-blue-800">Assessment & Diagnosis</h2><button onClick={() => handleAddCustomTable('assessment')} className="text-xs bg-slate-100 px-2 py-1 rounded hover:bg-slate-200">+ Add Table</button></div>
                  <textarea name="assessmentNote" value={formData.assessmentNote} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none min-h-[80px]" placeholder="Assessment notes..."></textarea>
                  
                  {formData.customTables.filter(t => t.section === 'assessment').map(table => (<CustomTableEditor key={table.id} table={table} updateTable={handleUpdateCustomTable} removeTable={() => handleRemoveCustomTable(table.id)} />))}
                  <input type="text" name="diagnosis" value={formData.diagnosis || ''} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-blue-50/50 border border-blue-100 rounded-md outline-none" placeholder="Diagnosis" />
                </section>

                <section className="bg-white p-3 sm:p-4 rounded-xl shadow-sm border border-slate-200 space-y-3">
                  <div className="flex items-center justify-between border-b border-slate-100 pb-2"><h2 className="font-semibold text-sm text-emerald-700">Treatment Plan</h2><button onClick={() => handleAddCustomTable('treatment')} className="text-xs bg-slate-100 px-2 py-1 rounded hover:bg-slate-200">+ Add Table</button></div>
                  <textarea name="treatmentNote" value={formData.treatmentNote} onChange={(e) => handleInputChange(e.target)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-md outline-none min-h-[80px]" placeholder="Treatment goals..."></textarea>
                  {formData.customTables.filter(t => t.section === 'treatment').map(table => (<CustomTableEditor key={table.id} table={table} updateTable={handleUpdateCustomTable} removeTable={() => handleRemoveCustomTable(table.id)} />))}
                </section>

                <div className="flex flex-wrap gap-3 justify-end pt-4 pb-8 border-t border-slate-200">
                  <div className="flex items-center gap-2 bg-white px-3 py-1.5 rounded-lg border border-slate-200 mr-auto">
                      <span className="text-xs font-semibold text-slate-500 uppercase">Date:</span>
                      <input type="date" name="date" value={formData.date || ''} onChange={(e) => handleInputChange(e.target)} className="text-sm font-medium text-slate-700 outline-none" />
                  </div>
                  
                  {/* PUBLISH TOGGLE */}
                  <div className="flex items-center gap-2 bg-emerald-50 px-3 py-1.5 rounded-lg border border-emerald-200 shadow-sm mr-auto sm:mr-0">
                      <label className="flex items-center gap-2 cursor-pointer text-sm font-bold text-emerald-800">
                          <input type="checkbox" checked={formData.isPublished || false} onChange={(e) => setFormData(prev => ({ ...prev, isPublished: e.target.checked }))} className="w-4 h-4 accent-emerald-600 cursor-pointer" />
                          Publish to Patient Portal
                      </label>
                  </div>

                  <button className="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50 shadow-sm" onClick={() => window.print()}>Print Admin Copy</button>
                  <button onClick={() => onSave(formData)} className="px-5 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow-sm">Save to Cloud</button>
                </div>
              </div>
              
              <div className="hidden print:block font-sans">
                  <h1>{formData.name} - {formData.ipId}</h1>
                  <p>Check the main website portal for the clean patient print layout.</p>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
